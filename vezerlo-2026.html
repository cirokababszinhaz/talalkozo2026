<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vezérlő – XVII. Találkozó</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --teal: #1a5c58; --teal-dark: #113d3a; --gold: #c4913a; --gold-light: #d4a84a; --bg: #f0ece3; --card: #fff; --text: #1a1a1a; --muted: #6b6258; --border: rgba(26,92,88,0.18); --red: #c0392b; --green: #1a7a4a; }
  body { background: var(--bg); font-family: 'Montserrat', sans-serif; font-weight: 500; min-height: 100vh; display: flex; flex-direction: column; transition: transform 0.5s; }
  
  /* Fejléc reszponzív javítása */
  header { background: var(--teal-dark); padding: 16px 24px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
  header .logo { font-weight: 700; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-light); }
  .header-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  header .badge { background: var(--red); color: #fff; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; padding: 4px 8px; border-radius: 2px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; text-decoration: none; border: 1px solid transparent; transition: 0.2s;}
  header .badge:hover { filter: brightness(1.2); }
  header .badge-gold { background: var(--gold); }
  header .badge-outline { background: transparent; border-color: rgba(255,255,255,0.3); }
  
  #loginScreen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .login-joke { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--teal-dark); text-align: center; margin-bottom: 30px; font-style: italic; line-height:1.4;}
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 32px; max-width: 380px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.05);}
  .login-box h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--teal-dark); margin-bottom: 6px; }

  #adminPanel { flex: 1; display: none; padding: 32px 20px 60px; max-width: 600px; margin: 0 auto; width: 100%; }
  h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--teal-dark); margin-bottom: 6px; }
  .subtitle { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; font-weight: 600; }

  .section-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; color: var(--teal); margin-bottom: 12px; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  input[type="email"], input[type="password"], textarea, select { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 3px; font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 14px; color: var(--text); background: #fff; margin-bottom: 16px; outline: none; }
  textarea { min-height: 90px; resize: vertical; }

  .btn { display: block; width: 100%; padding: 12px; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; border: none; border-radius: 3px; cursor: pointer; transition: .2s; margin-bottom: 10px; }
  .btn-primary { background: var(--red); color: #fff; }
  .btn-primary:hover { background: #a93226; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  .feedback { font-size: 12px; padding: 10px 14px; border-radius: 3px; margin-top: 4px; display: none; font-weight: 600;}
  .feedback.ok  { background: rgba(26,122,74,0.1); color: var(--green); border: 1px solid rgba(26,122,74,0.25); }
  .feedback.err { background: rgba(192,57,43,0.1); color: var(--red); border: 1px solid rgba(192,57,43,0.2); }

  .divider { height: 2px; background: var(--border); margin: 32px 0; }

  .alert-item { background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--red); border-radius: 4px; padding: 12px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;}
  .alert-meta { font-size: 10px; color: var(--muted); margin-bottom: 6px; font-weight: 700; text-transform: uppercase;}
  .alert-text { font-size: 14px; line-height: 1.4; color: var(--text); font-weight: 600;}
  .del-btn { background: #fee; color: var(--red); border: 1px solid var(--red); padding: 6px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; border:none;}
  
  .gb-item { border-left-color: var(--teal); flex-direction:column; }
  .gb-item .del-btn { background: var(--teal); color: #fff; margin-top:10px;}
  .gb-photo { max-width: 150px; border-radius: 4px; margin-top: 10px; border: 1px solid var(--border); display: block;}

  footer { background: var(--teal-dark); text-align: center; padding: 20px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); font-weight: 600; }

  /* MARIONETT MÓD ADMIN */
  .marionette-mode { animation: sway 3s infinite ease-in-out; transform-origin: top center; overflow: visible !important; }
  .marionette-mode::before, .marionette-mode::after { content:''; position:fixed; top:0; width:1px; background:rgba(0,0,0,0.4); height:100vh; z-index: 9999; pointer-events:none;}
  .marionette-mode::before { left: 20%; }
  .marionette-mode::after { right: 20%; }
  @keyframes sway { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }

</style>
</head>
<body>

<header>
  <div class="logo">XVII. Találkozó</div>
  <div class="header-actions">
    <!-- Csak bejelentkezve jelennek meg -->
    <a href="https://drive.google.com/file/d/169T5cqGkVrjowQZXFdXqsY-2yZodyUHk/view?usp=drive_link" target="_blank" class="badge badge-gold" id="phonebookBtn" style="display: none;">
      <span style="font-size:12px;">📞</span> Telefonkönyv
    </a>
    <a href="https://drive.google.com/drive/folders/1WwTYq5HThmX1w2ppVP381ymKDKL0U4uN?usp=sharing" target="_blank" class="badge badge-gold" id="allFilesBtn" style="display: none;">
      <span style="font-size:12px;">📁</span> MINDEN
    </a>
    
    <a href="index.html" class="badge badge-outline">⬅ Főoldalra</a>
    <div class="badge" id="logoutBtnTop" style="display: none;" onclick="window.doLogout()">Kijelentkezés</div>
    <div class="badge" id="marionetteBtn">Vezérlőpult</div>
  </div>
</header>

<div id="loginScreen">
  <div class="login-joke">Kíváncsiskodunk, kíváncsiskodunk,<br>a nézőtér meg üres?</div>
  <div class="login-box">
    <h2>Belépés</h2>
    <label for="emailInput" style="margin-top:20px;">Email cím</label>
    <input type="email" id="emailInput" placeholder="admin@ciroka.hu">
    
    <label for="pwdInput">Jelszó</label>
    <input type="password" id="pwdInput" onkeydown="if(event.key==='Enter') window.doLogin()">
    
    <button class="btn btn-primary" onclick="window.doLogin()">Belépés</button>
    <div class="feedback err" id="loginError">Hiba a belépésnél.</div>
  </div>
</div>

<div id="adminPanel">
  <h2>Értesítések kezelése</h2>
  <div class="subtitle">Havária és módosítások</div>

  <div class="section-title">Új értesítés közzététele</div>
  <label>Érintett program (Opcionális)</label>
  <select id="alertTarget">
    <option value="all">-- Általános (nem kötődik konkrét előadáshoz) --</option>
    <!-- Szombat -->
    <option value="show-eye-catching">Eye catching</option>
    <option value="show-lathatatlan">A láthatatlan jóbarát</option>
    <option value="show-atanaz">Atanáz, a lámpaláz</option>
    <option value="show-honvagy">Örökölt honvágy</option>
    <!-- Vasárnap -->
    <option value="show-cseresznyefa">Én és a cseresznyefa</option>
    <option value="show-piroska">Piroska és a farkas</option>
    <option value="show-kosziv">A kőszív</option>
    <option value="show-juhasz">Az igazmondó juhász</option>
    <option value="show-frida">Itt vagyok, hát élek, Frida</option>
    <!-- Hétfő -->
    <option value="show-tragedia-hetfo-d">Az ember tragédiája (Délelőtt)</option>
    <opt
